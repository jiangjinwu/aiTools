schema_version: "1.0"

extension:
  id: mvnd-bugfix-loop
  name: mvnd Bugfix Loop
  version: 1.0.4
  description: "Bridges mvnd-bugfix-loop into Spec Kit workflow for automatic build verification and fix reporting."
  author: jjw-java
  license: MIT

requires:
  speckit_version: ">=0.4.3"

provides:
  commands:
    - name: mvnd-bugfix-loop.fix
      file: commands/fix.md
      description: >
        Invoke mvnd-bugfix-loop skill to diagnose and fix build/test/startup
        failures. Generates bug report in specs/{feature}/bugs/ when SpecKit
        context is detected.

    - name: mvnd-bugfix-loop.check
      file: commands/check.md
      description: >
        Diagnostics command. Verifies mvnd-bugfix-loop skill is installed and
        reports extension readiness.

  config:
    - name: mvnd-bugfix-loop-config.yml
      template: mvnd-bugfix-loop-config.template.yml
      description: "mvnd Bugfix Loop configuration"
      required: false

hooks:
  after_implement:
    command: mvnd-bugfix-loop.fix
    optional: true
    prompt: "Run mvnd build verification after implementation?"
    description: >
      Optional post-implement hook. Runs mvnd verify to catch build/test
      failures after Spec Kit implementation completes. If failures found,
      enters fix loop and generates bug report.
