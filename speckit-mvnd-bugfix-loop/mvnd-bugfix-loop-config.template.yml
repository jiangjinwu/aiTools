# mvnd Bugfix Loop Configuration Template
# Copy to mvnd-bugfix-loop-config.yml and customize.

# mvnd command (default: mvnd)
mvnd_command: mvnd

# Default mvnd goal for verification (default: verify)
verify_goal: verify

# Auto-fix mode when SpecKit context is detected (default: true)
auto_mode_with_speckit: true

# Maximum fix loop iterations before escalation (default: 10)
max_fix_iterations: 10
